name: Daily Steam Scout

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Run scout
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scout_collect.py

      - name: Commit snapshots
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add snapshots/
          git commit -m "daily snapshot" || echo "no changes"
          git pull --rebase
          git push
